<?xml version="1.0" encoding="UTF-8"?>
<!--
  TriForge logo — 紫色方底 + 双锤交叉 + 铁砧 + TRIFORGE 字样
  重新用 SVG 还原（基于用户提供的位图）
  形状规格：viewBox 256x256，颜色与现有 CSS 变量 --accent 一致
  用途：assets/logo.svg，README / 品牌材料
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <style>
      .tf-bg     { fill: #6E5BD3; }
      .tf-icon   { fill: #111111; }
      .tf-text   {
        fill: #FFFFFF;
        font-family: 'Inter','SF Pro Display','Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-size: 36px;
      }
    </style>
  </defs>

  <!-- 圆角方底 -->
  <rect class="tf-bg" x="0" y="0" width="256" height="256" rx="44" ry="44"/>

  <!-- 双锤交叉 (X-shape smith hammers) -->
  <g class="tf-icon" transform="translate(128 90)">
    <!-- 左锤: 头朝右上, 把朝左下 -->
    <g transform="rotate(-40)">
      <!-- 锤头 -->
      <rect x="-32" y="-12" width="36" height="22" rx="3"/>
      <!-- 把 -->
      <rect x="2" y="-3" width="48" height="6" rx="1"/>
    </g>
    <!-- 右锤: 头朝左上, 把朝右下 -->
    <g transform="rotate(40)">
      <rect x="-32" y="-12" width="36" height="22" rx="3"/>
      <rect x="2" y="-3" width="48" height="6" rx="1"/>
    </g>
  </g>

  <!-- 铁砧 (放在双锤下方, 居中) -->
  <g class="tf-icon" transform="translate(128 158)">
    <!-- 砧面 (顶部宽扁) -->
    <path d="M -56 -16
             L  56 -16
             L  56  -4
             L  48  -4
             L  44   8
             L  28  18
             L -28  18
             L -44   8
             L -48  -4
             L -56  -4 Z"/>
  </g>

  <!-- 文字 TRIFORGE -->
  <text class="tf-text" x="128" y="232" text-anchor="middle">TRIFORGE</text>
</svg>
