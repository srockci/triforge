<!DOCTYPE html>
<html>
<head>
    <title>Model API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9; }
        .error { color: red; }
        .success { color: green; }
        .info { color: #0066cc; }
        .warning { color: #ff6600; }
        .api-help { 
            background: #e7f3ff; 
            border: 1px solid #b3d9ff; 
            border-radius: 4px; 
            padding: 15px; 
            margin-bottom: 20px;
        }
        .api-help h3 { margin-top: 0; color: #0066cc; }
        .api-help ul { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Model API Test</h1>
        
        <div class="api-help">
            <h3>🔑 How to get API keys</h3>
            <ul>
                <li><strong>MiniMax:</strong> Visit <a href="https://api.minimaxi.com" target="_blank">https://api.minimaxi.com</a> to get your API key</li>
                <li><strong>DeepSeek:</strong> Visit <a href="https://platform.deepseek.com" target="_blank">https://platform.deepseek.com</a> to get your API key</li>
            </ul>
            <p><strong>Note:</strong> If you use test keys, you'll see fallback models. Real API keys will give you the actual available models.</p>
        </div>
        
        <div class="form-group">
            <label for="providerKey">Provider Key:</label>
            <select id="providerKey">
                <option value="minimax">MiniMax</option>
                <option value="deepseek">DeepSeek</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="apiKey">API Key:</label>
            <input type="password" id="apiKey" placeholder="Enter your API key (leave empty to test fallback)">
        </div>
        
        <div class="form-group">
            <label for="baseUrl">Base URL:</label>
            <input type="text" id="baseUrl" placeholder="https://api.minimaxi.com/v1">
        </div>
        
        <button id="fetchBtn" onclick="fetchModels()">Fetch Models</button>
        
        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        async function fetchModels() {
            const providerKey = document.getElementById('providerKey').value;
            const apiKey = document.getElementById('apiKey').value;
            const baseUrl = document.getElementById('baseUrl').value;
            const btn = document.getElementById('fetchBtn');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = 'Loading...';
            result.style.display = 'block';
            result.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('/board/models', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        provider_key: providerKey,
                        api_key: apiKey,
                        base_url: baseUrl
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    let html = '<h3>Models Retrieved!</h3>';
                    if (data.status === 'success') {
                        html += `<p class="success">✅ Found ${data.total} models for ${data.provider}:</p>`;
                        html += '<ul>';
                        data.models.forEach(model => {
                            html += `<li>${model.id}</li>`;
                        });
                        html += '</ul>';
                        html += '<p class="info">🎉 These are the actual models available with your API key!</p>';
                    } else if (data.status === 'fallback') {
                        html += `<p class="warning">⚠️ Using ${data.total} common models for ${data.provider} (API call failed):</p>`;
                        html += '<ul>';
                        data.models.forEach(model => {
                            html += `<li>${model.id}</li>`;
                        });
                        html += '</ul>';
                        html += '<p class="error">❌ API call failed. Please check your API key or get one from:</p>';
                        html += '<ul>';
                        html += '<li><a href="https://api.minimaxi.com" target="_blank">MiniMax API</a></li>';
                        html += '<li><a href="https://platform.deepseek.com" target="_blank">DeepSeek API</a></li>';
                        html += '</ul>';
                        if (data.error) {
                            html += `<p class="info">💡 Technical details: ${data.error}</p>`;
                        }
                    } else {
                        html += `<p class="error">${data.message || 'Unknown error'}</p>`;
                    }
                    result.innerHTML = html;
                } else {
                    result.innerHTML = `<p class="error">Error: ${JSON.stringify(data)}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p class="error">Network error: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch Models';
            }
        }
    </script>
</body>
</html>
